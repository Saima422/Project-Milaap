<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1D9E75">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Sahayak">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="styles.css">
  <script src="stations.js"></script>
  <script src="install-prompt.js"></script>
  <title>Help Booths — Kumbh Sahayak</title>
  <style>
    .zone-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }
    .zone-btn {
      min-height: 64px;
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-primary);
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .zone-btn:active, .zone-btn.active {
      border-color: var(--primary);
      background: #e8f5f0;
      color: var(--primary);
    }
    .station-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .station-name {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .station-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .dist-badge {
      font-size: 0.8rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
    }
    .dist-near { background: #d1fae5; color: #065f46; }
    .dist-mid  { background: #fef3c7; color: #92400e; }
    .dist-far  { background: #f3f4f6; color: #6b7280; }
    .direction-arrow {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-secondary);
    }
    .arrow-icon {
      font-size: 1.1rem;
      display: inline-block;
    }
    .zone-badge-pill {
      font-size: 0.75rem;
      background: #e8f0fe;
      color: #1a56db;
      padding: 2px 10px;
      border-radius: 20px;
      font-weight: 600;
    }
    .maps-note {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-top: 6px;
    }
    .results-header {
      font-size: 1.1rem;
      font-weight: 800;
      margin: 20px 0 12px;
    }
  </style>
</head>
<body>
  <div id="install-banner" style="display:none; align-items:center; justify-content:space-between; background:#1D9E75; color:white; padding:10px 16px; font-size:14px; gap:8px;">
    <span>Install Kumbh Sahayak for offline use</span>
    <div style="display:flex;gap:8px;flex-shrink:0">
      <button onclick="installApp()" style="background:white; color:#1D9E75; border:none; padding:6px 14px; border-radius:6px; font-weight:600; cursor:pointer; font-size:13px;">Install</button>
      <button onclick="dismissBanner()" style="background:transparent; color:white; border:none; font-size:18px; cursor:pointer; padding:0 4px;">x</button>
    </div>
  </div>

  <nav class="navbar">
    <span class="navbar-brand">Kumbh Sahayak</span>
    <span class="navbar-page">Help Booths</span>
  </nav>

  <div id="toast" class="toast"></div>

  <div class="page">

    <!-- Section 1: Location -->
    <div id="section-location">
      <h2>Find Nearest Help Booth</h2>
      <p style="color:var(--text-secondary);margin-bottom:20px;">
        Find the nearest police station from your current location
      </p>
      <button id="btn-locate" class="btn btn-primary" onclick="useMyLocation()">
        📍 Use My Location
      </button>
      <div id="locate-loading" style="display:none;text-align:center;padding:20px 0;">
        <div class="spinner-center"><div class="spinner"></div></div>
        <p style="color:var(--text-secondary);margin-top:10px;">Getting your location…</p>
      </div>
      <div id="location-denied" style="display:none;margin-top:12px;padding:12px 16px;background:#FCEBEB;border:1px solid #E24B4A;border-radius:8px;font-size:14px;color:#A32D2D;">
        Location access denied.
      </div>
    </div>

    <!-- Section 2: Zone picker -->
    <div id="section-zone" style="display:none;">
      <div style="margin-top:20px;">
        <label style="font-weight:600;font-size:0.9rem;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.04em;">Or select your zone</label>
        <div class="zone-grid">
          <button class="zone-btn" onclick="selectZone('Zone-1', this)">Zone-1</button>
          <button class="zone-btn" onclick="selectZone('Zone-2', this)">Zone-2</button>
          <button class="zone-btn" onclick="selectZone('Zone-3', this)">Zone-3</button>
          <button class="zone-btn" onclick="selectZone('Zone-4', this)">Zone-4</button>
          <button class="zone-btn" style="grid-column:1/-1;" onclick="selectZone('Zone-5', this)">Zone-5</button>
        </div>
      </div>
    </div>

    <!-- Section 3: Results -->
    <div id="section-results" style="display:none;">
      <div class="results-header" id="results-header"></div>
      <div id="stations-list"></div>
      <button class="btn btn-ghost" style="margin-top:8px;" onclick="resetPage()">↩ Search Again</button>
    </div>

  </div>

  <nav class="bottom-nav">
    <a href="intake.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5"/><path d="M17.5 3.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 8.5-8.5z"/></svg>
      Intake
    </a>
    <a href="scanner.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><path d="M14 14h3v3m0 4h4m-4-4v4m-3-7h7"/></svg>
      Scanner
    </a>
    <a href="operator.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
      Operator
    </a>
    <a href="dashboard.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Dashboard
    </a>
    <a href="register.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
      Register
    </a>
    <a href="booths.html" class="active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      Booths
    </a>
  </nav>

  <script>
    function showToast(msg, type = 'error') {
      const t = document.getElementById('toast');
      t.className = 'toast show toast-' + type;
      t.textContent = msg;
      clearTimeout(window._tt);
      window._tt = setTimeout(() => t.classList.remove('show'), 4000);
    }

    function distClass(km) {
      if (km < 1) return 'dist-near';
      if (km <= 3) return 'dist-mid';
      return 'dist-far';
    }

    function stationCardHtml(s, showDistance) {
      const dirHtml = showDistance ? `
        <span class="direction-arrow">
          <span class="arrow-icon" style="transform:rotate(${s.bearing}deg);display:inline-block;">↑</span>
          ${s.bearingLabel}
        </span>` : '';
      const distHtml = showDistance ? `
        <span class="dist-badge ${distClass(s.distance)}">${s.distance.toFixed(1)} km</span>` : '';
      const mapsUrl = getMapsUrl(s.lat, s.lng, s.name);
      return `
        <div class="station-card">
          <div class="station-name">${s.name}</div>
          <div class="station-meta">
            ${distHtml}
            ${dirHtml}
            <span class="zone-badge-pill">${s.zone}</span>
          </div>
          <a href="${mapsUrl}" target="_blank" rel="noopener" class="btn btn-primary btn-sm" style="display:inline-block;text-decoration:none;">
            🗺 Get Directions
          </a>
          <div class="maps-note">Opens Google Maps. Requires internet.</div>
        </div>`;
    }

    function showResults(stations, header, showDistance) {
      document.getElementById('results-header').textContent = header;
      document.getElementById('stations-list').innerHTML = stations.map(s => stationCardHtml(s, showDistance)).join('');
      document.getElementById('section-results').style.display = 'block';
      document.getElementById('section-results').scrollIntoView({ behavior: 'smooth' });
    }

    function useMyLocation() {
      document.getElementById('btn-locate').style.display = 'none';
      document.getElementById('locate-loading').style.display = 'block';

      navigator.geolocation.getCurrentPosition(
        pos => {
          document.getElementById('locate-loading').style.display = 'none';
          const { latitude, longitude } = pos.coords;
          const nearest = getNearestStations(latitude, longitude, 3);
          showResults(nearest, '3 Nearest Stations', true);
        },
        () => {
          document.getElementById('locate-loading').style.display = 'none';
          document.getElementById('location-denied').style.display = 'block';
          document.getElementById('section-zone').style.display = 'block';
        },
        { timeout: 10000 }
      );
    }

    function selectZone(zone, btn) {
      document.querySelectorAll('.zone-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const stations = getStationsByZone(zone).sort((a, b) => a.name.localeCompare(b.name));
      showResults(stations, 'Stations in ' + zone, false);
    }

    function resetPage() {
      document.getElementById('section-results').style.display = 'none';
      document.getElementById('section-zone').style.display = 'none';
      document.getElementById('location-denied').style.display = 'none';
      document.getElementById('btn-locate').style.display = 'block';
      document.getElementById('locate-loading').style.display = 'none';
      document.querySelectorAll('.zone-btn').forEach(b => b.classList.remove('active'));
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => { navigator.serviceWorker.register('/service-worker.js'); });
    }
  </script>
</body>
</html>
